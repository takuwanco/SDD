[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

# Coverage settings
addopts =
    --cov=sdd_generator
    --cov-report=html
    --cov-report=term-missing
    --cov-branch
    -v
    -s

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    api: API endpoint tests
    websocket: WebSocket tests
    slow: Slow running tests
